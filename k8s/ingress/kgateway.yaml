# =============================================================
# kgateway.yaml — KGateway (Envoy-based) Gateway + HTTPRoute
#
# Requires: kgateway installed in the cluster.
# Install:  https://kgateway.dev/docs/installation/
# =============================================================

# GatewayClass — use the kgateway controller
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: kgateway
spec:
  controllerName: kgateway.dev/kgateway

---
# Gateway — listen on port 80 for HTTP traffic
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: elderping-gateway
  namespace: elderping
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

---
# HTTPRoute — route all traffic to the ui-service
# The Nginx in ui-service handles /api/* proxying internally
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: elderping-httproute
  namespace: elderping
spec:
  parentRefs:
    - name: elderping-gateway
      namespace: elderping
  rules:
    # Route /api/auth/* to auth-service directly (optional bypass)
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          port: 3000
          weight: 1
    # Route /api/health/* to health-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/health
      backendRefs:
        - name: health-service
          port: 3000
          weight: 1
    # Route /api/reminder/* to reminder-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/reminder
      backendRefs:
        - name: reminder-service
          port: 3000
          weight: 1
    # Route /api/alert/* to alert-service
    - matches:
        - path:
            type: PathPrefix
            value: /api/alert
      backendRefs:
        - name: alert-service
          port: 3000
          weight: 1
    # Default: all other traffic goes to the React UI
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ui-service
          port: 80
          weight: 1
